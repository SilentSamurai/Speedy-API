name: Maven Build

# PR pipeline for main:
#   1. build     — full `mvn clean install` against in-memory H2 (the fast gate).
#   2. changes   — detect whether the PR touches code (vs docs-only).
#   3. db-tests  — only if H2 passed AND code changed: run the speedy-test-app
#                  suite against real Postgres + MySQL (mirrors db-tests/run-test.py).
#   4. verify    — only after build + db-tests pass (same-repo PRs): dry-run the
#                  release machinery (creds, GPG signing, Central Portal, bump
#                  script) so a broken release setup fails the PR before the
#                  merge-to-main that publishes.

on:
    pull_request:
        branches: [ main ]
    workflow_dispatch:
        inputs:
            tests:
                description: "Surefire test pattern for the DB job (e.g. 'SpeedyGetTest,SpeedyPostTest'). Blank = full suite."
                required: false
                default: ''

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: H2 build & tests
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v5
            -   name: Set up JDK 17
                uses: actions/setup-java@v5
                with:
                    java-version: '17'
                    distribution: 'temurin'
                    cache: maven
            -   name: Build with Maven (H2)
                run: mvn -B --no-transfer-progress clean install

    changes:
        name: Detect relevant changes
        runs-on: ubuntu-latest
        outputs:
            run-db: ${{ steps.filter.outputs.run-db }}
        steps:
            -   uses: actions/checkout@v5
                with:
                    fetch-depth: 0
            -   id: filter
                name: Decide whether to run DB tests
                run: |
                    # Manual runs always exercise the DB tests.
                    if [ "${{ github.event_name }}" != "pull_request" ]; then
                        echo "Not a PR — running DB tests."
                        echo "run-db=true" >> "$GITHUB_OUTPUT"
                        exit 0
                    fi

                    files=$(git diff --name-only \
                        "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}")
                    echo "Changed files:"
                    echo "$files"

                    # Run DB tests unless the PR only touches docs / markdown / load-test files.
                    # Ignore-list (not allow-list) so a new module never silently skips coverage.
                    relevant=$(echo "$files" | grep -vE '^(docs/|k6-load-test/)|\.md$' || true)
                    if [ -n "$relevant" ]; then
                        echo "run-db=true" >> "$GITHUB_OUTPUT"
                    else
                        echo "Only docs/non-code changed — skipping DB tests."
                        echo "run-db=false" >> "$GITHUB_OUTPUT"
                    fi

    db-tests:
        name: ${{ matrix.db }}
        needs: [ build, changes ]
        if: needs.changes.outputs.run-db == 'true'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    -   db: postgres
                        image: postgres:16
                        profile: postgres
                        url: jdbc:postgresql://localhost:5432/testdb
                        port: 5432:5432
                        health: >-
                            --health-cmd "pg_isready -U user -d testdb"
                            --health-interval 10s --health-timeout 5s --health-retries 10
                    -   db: mysql
                        image: mysql:8
                        profile: mysql
                        url: jdbc:mysql://localhost:3306/mydatabase
                        port: 3306:3306
                        health: >-
                            --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
                            --health-interval 10s --health-timeout 5s --health-retries 10

        services:
            db:
                image: ${{ matrix.image }}
                ports:
                    - ${{ matrix.port }}
                # Both env blocks are provided; each image ignores the keys it
                # doesn't recognise, so a single service definition serves both DBs.
                env:
                    POSTGRES_DB: testdb
                    POSTGRES_USER: user
                    POSTGRES_PASSWORD: password
                    MYSQL_ROOT_PASSWORD: rootpassword
                    MYSQL_DATABASE: mydatabase
                    MYSQL_USER: user
                    MYSQL_PASSWORD: password
                options: ${{ matrix.health }}

        steps:
            -   uses: actions/checkout@v5

            -   name: Set up JDK 17
                uses: actions/setup-java@v5
                with:
                    java-version: '17'
                    distribution: 'temurin'
                    cache: maven

            # speedy-test-app depends on the other modules, so install them first
            # (matches `mvn install -DskipTests` at the root in run-test.py).
            -   name: Install modules
                run: mvn -B --no-transfer-progress install -DskipTests

            -   name: Run speedy-test-app against ${{ matrix.db }}
                env:
                    DATABASE_URL: ${{ matrix.url }}
                    DATABASE_USERNAME: user
                    DATABASE_PASSWORD: password
                    SPRING_PROFILES_ACTIVE: ${{ matrix.profile }}
                run: |
                    ARGS=""
                    if [ -n "${{ github.event.inputs.tests }}" ]; then
                        ARGS="-Dtest=${{ github.event.inputs.tests }}"
                    fi
                    mvn -B --no-transfer-progress test -pl speedy-test-app $ARGS

            -   name: Upload Surefire reports
                if: always()
                uses: actions/upload-artifact@v7
                with:
                    name: surefire-${{ matrix.db }}
                    path: speedy-test-app/target/surefire-reports/
                    if-no-files-found: ignore

    # Release-readiness dry-run. Runs only after the H2 build and both DB legs
    # pass, and only for same-repo PRs (forks don't get the publishing secrets).
    # On a docs-only PR, db-tests is skipped, so this is skipped too — which is
    # correct: such merges don't publish (release.yml paths-ignore).
    verify:
        name: Release readiness
        needs: [ build, db-tests ]
        if: github.event.pull_request.head.repo.full_name == github.repository
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v5
                with:
                    token: ${{ secrets.GITHUB_TOKEN }}

            -   name: Set up Maven Central Repository
                uses: actions/setup-java@v5
                with:
                    java-version: '17'
                    distribution: 'temurin'
                    server-id: ossrh
                    server-username: MAVEN_USERNAME
                    server-password: MAVEN_PASSWORD
                    gpg-passphrase: MAVEN_GPG_PASSPHRASE

            -   name: Configure Git
                run: |
                    git config --global user.name "github-actions[bot]"
                    git config --global user.email "github-actions[bot]@users.noreply.github.com"

            -   name: Verify Maven Central Credentials
                env:
                    MAVEN_USERNAME: ${{ secrets.OSSRH_TOKEN_USERNAME }}
                    MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN_PASSWORD }}
                    MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
                run: |
                    echo "🔐 Verifying Maven Central credentials..."

                    if [[ -z "$MAVEN_USERNAME" ]]; then
                        echo "❌ Error: MAVEN_USERNAME secret is not set"
                        exit 1
                    fi

                    if [[ -z "$MAVEN_PASSWORD" ]]; then
                        echo "❌ Error: MAVEN_PASSWORD secret is not set"
                        exit 1
                    fi

                    if [[ -z "$MAVEN_GPG_PASSPHRASE" ]]; then
                        echo "❌ Error: MAVEN_GPG_PASSPHRASE secret is not set"
                        exit 1
                    fi

                    echo "✅ Central Portal credentials configured"

            -   name: Install and Verify GPG Key
                env:
                    MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
                    GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
                run: |
                    echo "🔑 Installing and verifying GPG signing key..."

                    if [[ -n "$GPG_SIGNING_KEY" ]]; then
                        # Create .gnupg directory and configure GPG for non-interactive use
                        mkdir -p ~/.gnupg
                        echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf

                        # Import the GPG key
                        GPG_KEY_FILE=$(mktemp)
                        printf '%s' "$GPG_SIGNING_KEY" > "$GPG_KEY_FILE"
                        gpg --batch --import "$GPG_KEY_FILE"
                        rm -f "$GPG_KEY_FILE"

                        # List the imported keys
                        echo "📋 Imported GPG keys:"
                        gpg --list-secret-keys --keyid-format LONG

                        # Get the key ID
                        KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep -E "^sec" | head -1 | awk '{print $2}' | cut -d'/' -f2)

                        if [[ -n "$KEY_ID" ]]; then
                            echo "🔑 Testing GPG key passphrase for key: $KEY_ID"

                            # Test the passphrase by trying to sign a test file
                            echo "test" > /tmp/test.txt

                            if echo "$MAVEN_GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 --sign /tmp/test.txt; then
                                echo "✅ GPG key passphrase verified successfully"
                                rm -f /tmp/test.txt /tmp/test.txt.gpg
                            else
                                echo "❌ Error: GPG key passphrase verification failed"
                                rm -f /tmp/test.txt /tmp/test.txt.gpg
                                exit 1
                            fi
                        else
                            echo "❌ Error: No GPG key found after import"
                            exit 1
                        fi

                        echo "✅ GPG key installed and verified successfully"
                    else
                        echo "❌ Error: GPG_SIGNING_KEY secret is not set"
                        exit 1
                    fi

            -   name: Verify Maven Build
                run: |
                    echo "🔨 Verifying Maven build process..."
                    mvn --no-transfer-progress --batch-mode clean compile test-compile
                    echo "✅ Maven build verification completed"

            -   name: Verify Central Portal Connection
                env:
                    MAVEN_USERNAME: ${{ secrets.OSSRH_TOKEN_USERNAME }}
                    MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN_PASSWORD }}
                run: |
                    echo "🌐 Testing Central Portal credentials..."

                    # Test the Central Portal API using the publisher status endpoint
                    RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -u "$MAVEN_USERNAME:$MAVEN_PASSWORD" https://central.sonatype.com/api/v1/publisher/status)

                    if [[ "$RESPONSE" =~ ^[25][0-9][0-9]$ ]]; then
                        echo "✅ Successfully connected to Central Portal (HTTP $RESPONSE)"
                    elif [[ "$RESPONSE" == "401" || "$RESPONSE" == "403" ]]; then
                        echo "❌ Authentication failed with Central Portal (HTTP $RESPONSE)"
                        exit 1
                    else
                        echo "⚠️ Unexpected response from Central Portal (HTTP $RESPONSE)"
                        echo "   This might indicate the API endpoint is not available or credentials need updating"
                        exit 1
                    fi

            -   name: Verify Version Bump Script
                run: |
                    echo "📝 Verifying version bump script..."

                    if [[ ! -f "./update-patch-version.sh" ]]; then
                        echo "❌ Error: update-patch-version.sh script not found"
                        exit 1
                    fi

                    chmod +x ./update-patch-version.sh

                    if ! command -v jq &> /dev/null; then
                        echo "❌ Error: jq is required but not available"
                        exit 1
                    fi

                    echo "✅ Version bump script verified"

            -   name: Summary
                run: |
                    echo ""
                    echo "🎉 Release Pull Request Verification Summary"
                    echo "=========================================="
                    echo "✅ Central Portal credentials verified"
                    echo "✅ GPG signing key installed"
                    echo "✅ Maven build process verified"
                    echo "✅ OSSRH connection tested"
                    echo "✅ Version bump script verified"
                    echo ""
                    echo "📊 Current version: $(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
                    echo "🌿 Branch: ${{ github.head_ref }}"
                    echo "🔗 PR: #${{ github.event.number }}"
                    echo ""
                    echo "🚀 This pull request is ready for release!"
