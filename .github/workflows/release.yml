name: Publish package to the Maven Central Repository
on:
    push:
        branches:
            - main
        # A merge that only touches docs / load-tests / CI should not cut a
        # Maven Central release. Triggers only when code/build files change.
        paths-ignore:
            - 'docs/**'
            - 'k6-load-test/**'
            - '**.md'
            - '.github/**'

# Serialize releases: never run two publishes at once (each bumps off Central),
# and never cancel an in-flight publish.
concurrency:
    group: release
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
                with:
                    token: ${{ secrets.GITHUB_TOKEN }}

            -   name: Set up Central Portal Repository
                uses: actions/setup-java@v4
                with:
                    java-version: 17
                    distribution: 'temurin'
                    server-id: central-portal
                    server-username: MAVEN_USERNAME
                    server-password: MAVEN_PASSWORD
                    gpg-passphrase: MAVEN_GPG_PASSPHRASE

            -   name: Configure Git
                run: |
                    git config --global user.name "github-actions[bot]"
                    git config --global user.email "github-actions[bot]@users.noreply.github.com"

            -   name: Bump patch version
                run: |
                    chmod +x ./update-patch-version.sh
                    # Run the script (now fully automated)
                    ./update-patch-version.sh

            -   id: install-secret-key
                name: Install gpg secret key
                env:
                    GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
                run: |
                    GPG_KEY_FILE=$(mktemp)
                    printf '%s' "$GPG_SIGNING_KEY" > "$GPG_KEY_FILE"
                    gpg --batch --import "$GPG_KEY_FILE"
                    rm -f "$GPG_KEY_FILE"
                    gpg --list-secret-keys --keyid-format LONG

            -   id: publish-to-central
                name: Publish to Central Repository
                env:
                    MAVEN_USERNAME: ${{ secrets.OSSRH_TOKEN_USERNAME }}
                    MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN_PASSWORD }}
                    MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
                run: |
                    mvn --no-transfer-progress --batch-mode clean deploy -P=central-portal

            -   name: Commit and push version changes
                run: |
                    # Get the new version from pom.xml
                    NEW_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
                    # Commit and push changes
                    git add pom.xml **/pom.xml update-patch-version.sh
                    git commit -m "Bump version to $NEW_VERSION"
                    # Create and push tag
                    git tag -a "v$NEW_VERSION" -m "Release version $NEW_VERSION"
                    # Push tag 
                    git push origin "v$NEW_VERSION"
                    echo "✅ Successfully committed version $NEW_VERSION and pushed tag v$NEW_VERSION"
